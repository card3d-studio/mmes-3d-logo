<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morehead Montessori 3D Logo</title>
    <meta
      name="description"
      content="Interactive 3D Morehead Montessori logo."
    />

    <link rel="icon" href="%BASE_URL%favicon.ico" />

    <meta property="og:title" content="Morehead Montessori 3D Logo" />
    <meta
      property="og:description"
      content="Interactive 3D Morehead Montessori logo."
    />
    <meta
      property="og:image"
      content="https://card3d-studio.github.io/mmes-3d-logo/thumbnail.png"
    />
    <meta
      property="og:url"
      content="https://card3d-studio.github.io/mmes-3d-logo/"
    />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Morehead Montessori 3D Logo" />
    <meta
      name="twitter:description"
      content="Interactive 3D Morehead Montessori logo."
    />
    <meta
      name="twitter:image"
      content="https://card3d-studio.github.io/mmes-3d-logo/thumbnail.png"
    />
  </head>
  <body>
    <main class="page-shell">
      <figure
        class="logo-figure"
        aria-labelledby="logo-title"
        aria-describedby="logo-description"
      >
        <div id="app" class="logo-stage" data-ready="false">
          <img
            class="logo-fallback"
            src="%BASE_URL%Morehead-Montessori-Magnet_Logo.png"
            alt="Morehead Montessori logo"
          />
        </div>

        <figcaption id="logo-title" class="sr-only">
          Morehead Montessori 3D logo
        </figcaption>

        <p id="logo-description" class="sr-only">
          Interactive three-dimensional Morehead Montessori logo. Drag or swipe
          to rotate the logo. A static image is shown if interactive graphics
          are unavailable or reduced-motion settings are preferred.
        </p>
      </figure>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
